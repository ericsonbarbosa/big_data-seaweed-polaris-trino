---
# ==============================================================================
# 1. JAVA 21
# ==============================================================================
- name: "polaris : Instalar Java 21"
  apt:
    name: "{{ polaris_java_package }}"
    state: present
    update_cache: yes
  become: yes

- name: "polaris : Verificar versão do Java"
  command: java -version
  environment:
    JAVA_HOME: "{{ polaris_java_home }}"
  register: java_version
  changed_when: false

# ==============================================================================
# 2. USUÁRIO E DIRETÓRIOS
# ==============================================================================
- name: "polaris : Criar grupo do serviço"
  group:
    name: "{{ polaris_group }}"
    state: present
  become: yes

- name: "polaris : Criar usuário do serviço"
  user:
    name: "{{ polaris_user }}"
    group: "{{ polaris_group }}"
    shell: /sbin/nologin
    create_home: no
    state: present
  become: yes

- name: "polaris : Criar diretórios base"
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ polaris_user }}"
    group: "{{ polaris_group }}"
    mode: '0755'
  loop:
    - "{{ polaris_install_dir }}"
    - "{{ polaris_data_dir }}"
    - "{{ polaris_log_dir }}"
    - "{{ polaris_conf_dir }}"
  become: yes

- name: "polaris : Garantir que o banco de dados existe no PostgreSQL"
  postgresql_db:
    name: "{{ polaris_db_name }}"
    state: present
  become: yes
  become_user: postgres
  tags: db_setup

# ==============================================================================
# 3. DOWNLOAD E INSTALAÇÃO
# ==============================================================================

- name: "polaris : Limpar diretório temporário antes de extrair"
  file:
    path: "/tmp/polaris_extract"
    state: absent
  become: yes

- name: "polaris : Criar diretório temporário de extração"
  file:
    path: "/tmp/polaris_extract"
    state: directory
    mode: '0755'
  become: yes

- name: "polaris : Descompactar binário para o servidor"
  unarchive:
    src: "{{ polaris_archive }}"
    dest: "/tmp/polaris_extract"
    owner: "{{ polaris_user }}"
    group: "{{ polaris_group }}"
  become: yes

# O archive extrai para polaris-bin-X.Y.Z-incubating/ — capturamos dinamicamente
# para não depender da versão fixada em variável.
- name: "polaris : Identificar diretório raiz extraído"
  find:
    paths: "/tmp/polaris_extract"
    file_type: directory
    recurse: no
  register: extracted_root
  become: yes

- name: "polaris : Falhar se o diretório raiz não foi encontrado"
  fail:
    msg: >
      Nenhum diretório encontrado em /tmp/polaris_extract após a extração.
      Verifique se 'polaris_archive' aponta para o arquivo correto.
  when: extracted_root.files | length == 0

- name: "polaris : Registrar caminho raiz extraído"
  set_fact:
    polaris_extracted_dir: "{{ extracted_root.files[0].path }}"

- name: "polaris : Verificar que o JAR Quarkus existe no pacote extraído"
  stat:
    path: "{{ polaris_extracted_dir }}/server/quarkus-run.jar"
  register: quarkus_jar_stat
  become: yes

- name: "polaris : Falhar se quarkus-run.jar não existe no pacote"
  fail:
    msg: >
      Arquivo '{{ polaris_extracted_dir }}/server/quarkus-run.jar' não encontrado.
      Estrutura inesperada no archive '{{ polaris_archive }}'.
  when: not quarkus_jar_stat.stat.exists

- name: "polaris : Copiar conteúdo extraído para o diretório final"
  shell: |
    cp -r {{ polaris_extracted_dir }}/* {{ polaris_install_dir }}/
    chown -R {{ polaris_user }}:{{ polaris_group }} {{ polaris_install_dir }}
  become: yes
  notify: restart polaris

- name: "polaris : Criar link simbólico polaris-runner.jar → server/quarkus-run.jar"
  file:
    src: "{{ polaris_install_dir }}/server/quarkus-run.jar"
    dest: "{{ polaris_install_dir }}/polaris-runner.jar"
    state: link
    force: yes
    owner: "{{ polaris_user }}"
    group: "{{ polaris_group }}"
  become: yes

- name: "polaris : Garantir permissões no diretório de instalação"
  file:
    path: "{{ polaris_install_dir }}"
    state: directory
    owner: "{{ polaris_user }}"
    group: "{{ polaris_group }}"
    recurse: yes
    mode: '0755'
  become: yes

- name: "polaris : Remover diretório temporário de extração"
  file:
    path: "/tmp/polaris_extract"
    state: absent
  become: yes

# ==============================================================================
# 4. CONFIGURAÇÃO
# ==============================================================================
- name: "polaris : Aplicar application.properties"
  template:
    src: application.properties.j2
    dest: "{{ polaris_conf_dir }}/application.properties"
    owner: "{{ polaris_user }}"
    group: "{{ polaris_group }}"
    mode: '0640'
  become: yes
  notify: restart polaris

# ==============================================================================
# 5. SERVIÇO SYSTEMD
# ==============================================================================
- name: "polaris : Instalar unit systemd"
  template:
    src: polaris.service.j2
    dest: /etc/systemd/system/polaris.service
    mode: '0644'
  become: yes
  notify: reload systemd

- name: "polaris : Recarregar daemon do systemd"
  systemd:
    daemon_reload: yes
  become: yes

# ==============================================================================
# 6. INICIALIZAÇÃO
# ==============================================================================
- name: "polaris : Iniciar e habilitar serviço"
  systemd:
    name: polaris
    state: started
    enabled: yes
  become: yes

- name: "polaris : Aguardar porta do REST Catalog estar disponível"
  wait_for:
    host: "127.0.0.1"
    port: "{{ polaris_port }}"
    delay: 5
    timeout: 90

- name: "polaris : Aguardar endpoint de health responder (Quarkus SmallRye Health)"
  uri:
    url: "http://127.0.0.1:{{ polaris_port }}/q/health/ready"
    method: GET
    status_code: [200]
  register: health_result
  until: health_result.status == 200
  retries: 18
  delay: 5
  become: no
  ignore_errors: yes  # Cobre versões que exponham o health em path diferente

- name: "polaris : Pausa de estabilização final"
  pause:
    seconds: 5

# ==============================================================================
# 7. BOOTSTRAP — Bucket S3 + Catalog Iceberg inicial
# ==============================================================================
- name: "polaris : Instalar AWS CLI (para criar bucket no SeaweedFS)"
  apt:
    name: awscli
    state: present
  become: yes

# ------------------------------------------------------------------------------
# Criar bucket warehouse no SeaweedFS
# ------------------------------------------------------------------------------
- name: "polaris : Criar bucket 'warehouse' no SeaweedFS"
  shell: |
    aws s3 mb s3://{{ polaris_default_warehouse_bucket }} \
      --endpoint-url {{ polaris_s3_endpoint }}
  environment:
    AWS_ACCESS_KEY_ID: "{{ polaris_s3_access_key }}"
    AWS_SECRET_ACCESS_KEY: "{{ polaris_s3_secret_key }}"
    AWS_DEFAULT_REGION: "{{ polaris_s3_region }}"
  register: bucket_result
  failed_when:
    - bucket_result.rc != 0
    - "'BucketAlreadyOwnedByYou' not in bucket_result.stderr"
    - "'BucketAlreadyExists' not in bucket_result.stderr"
  changed_when: "'make_bucket' in bucket_result.stdout"
  become: no

# ------------------------------------------------------------------------------
# Capturar credenciais bootstrap reais geradas pelo Polaris
# ------------------------------------------------------------------------------
- name: "polaris : Capturar credenciais bootstrap do Polaris"
  shell: |
    journalctl -u polaris --no-pager \
    | grep "credentials:" \
    | tail -n 1
  register: polaris_bootstrap_log
  changed_when: false
  become: yes

# ------------------------------------------------------------------------------
# Capturar credenciais reais geradas pelo Polaris
# ------------------------------------------------------------------------------

- name: "polaris : Capturar linha de credenciais bootstrap"
  shell: |
    journalctl -u polaris --no-pager | \
    grep "root principal credentials:" | \
    tail -n 1
  register: polaris_bootstrap
  changed_when: false
  become: yes

- name: "polaris : Validar credenciais bootstrap"
  fail:
    msg: |
      Não foi possível localizar as credenciais bootstrap no log do Polaris.

      Saída encontrada:
      {{ polaris_bootstrap.stdout }}
  when: polaris_bootstrap.stdout == ""

- name: "polaris : Extrair bloco de credenciais"
  set_fact:
    polaris_credentials_raw: >-
      {{ polaris_bootstrap.stdout.split('credentials:')[-1].strip() }}

- name: "polaris : Extrair client_id e client_secret"
  set_fact:
    dynamic_realm: "{{ polaris_realm }}"
    dynamic_client_id: "{{ polaris_credentials_raw.split(':')[0] }}"
    dynamic_client_secret: "{{ polaris_credentials_raw.split(':')[1] }}"

- name: "polaris : Exibir credenciais detectadas"
  debug:
    msg:
      - "Realm.............: {{ dynamic_realm }}"
      - "Client ID.........: {{ dynamic_client_id }}"
      - "Client Secret.....: {{ dynamic_client_secret }}"

# Após "polaris : Exibir credenciais detectadas"

- name: "polaris : Persistir credenciais bootstrap em arquivo"
  copy:
    dest: "{{ polaris_conf_dir }}/bootstrap-credentials.env"
    owner: "{{ polaris_user }}"
    group: "{{ polaris_group }}"
    mode: '0640'
    content: |
      POLARIS_REALM={{ dynamic_realm }}
      POLARIS_CLIENT_ID={{ dynamic_client_id }}
      POLARIS_CLIENT_SECRET={{ dynamic_client_secret }}
  become: yes

# ------------------------------------------------------------------------------
# Obter token OAuth2 do Polaris
# ------------------------------------------------------------------------------
- name: "polaris : Forçar execução dos handlers pendentes (Restart Polaris)"
  meta: flush_handlers

- name: "polaris : Obter token de acesso (root)"
  uri:
    url: "http://127.0.0.1:{{ polaris_port }}/api/catalog/v1/oauth/tokens"
    method: POST
    headers:
      Polaris-Realm: "{{ dynamic_realm }}"
    body_format: form-urlencoded
    body:
      grant_type: "client_credentials"
      client_id: "{{ dynamic_client_id }}"
      client_secret: "{{ dynamic_client_secret }}"
      scope: "PRINCIPAL_ROLE:ALL"
    status_code: 200
  register: polaris_token
  become: no

# ------------------------------------------------------------------------------
# Criar catálogo Iceberg
# ------------------------------------------------------------------------------
- name: "polaris : Criar catalog 'iceberg' apontando para SeaweedFS"
  uri:
    url: "http://127.0.0.1:{{ polaris_port }}/api/management/v1/catalogs"
    method: POST
    headers:
      Authorization: "Bearer {{ polaris_token.json.access_token }}"
      Content-Type: "application/json"
      Polaris-Realm: "{{ dynamic_realm }}"
    body_format: json
    body:
      catalog:
        name: "iceberg"
        type: "INTERNAL"
        
        properties:
          "default-base-location": "s3://{{ polaris_default_warehouse_bucket }}/iceberg"
          "s3.endpoint": "{{ polaris_s3_endpoint }}"
          "s3.access-key-id": "{{ polaris_s3_access_key }}"
          "s3.secret-access-key": "{{ polaris_s3_secret_key }}"
          "s3.path-style-access": "{{ polaris_s3_path_style | string | lower }}"
          "s3.region": "{{ polaris_s3_region }}"
          
        storageConfigInfo:
          storageType: "S3"
          allowedLocations:
            - "s3://{{ polaris_default_warehouse_bucket }}/"

    status_code: [200, 201, 409]
  register: polaris_catalog_result
  become: no

# ------------------------------------------------------------------------------
# RBAC: Catalog Role com privilégio de gestão
# ------------------------------------------------------------------------------
- name: "polaris : Criar Catalog Role dentro do catálogo 'iceberg'"
  uri:
    url: "http://127.0.0.1:{{ polaris_port }}/api/management/v1/catalogs/iceberg/catalog-roles"
    method: POST
    headers:
      Authorization: "Bearer {{ polaris_token.json.access_token }}"
      Content-Type: "application/json"
      Polaris-Realm: "{{ dynamic_realm }}"
    body_format: json
    body:
      catalogRole:
        name: "iceberg_admin_role"
    status_code: [200, 201, 409]
  become: no

- name: "polaris : Aguardar registro da Catalog Role"
  pause:
    seconds: 3

- name: "polaris : Conceder privilégio CATALOG_MANAGE_CONTENT à Catalog Role"
  uri:
    url: "http://127.0.0.1:{{ polaris_port }}/api/management/v1/catalogs/iceberg/catalog-roles/iceberg_admin_role/grants"
    method: PUT
    headers:
      Authorization: "Bearer {{ polaris_token.json.access_token }}"
      Content-Type: "application/json"
      Polaris-Realm: "{{ dynamic_realm }}"
    body_format: json
    body:
      grant:
        type: "catalog"
        privilege: "CATALOG_MANAGE_CONTENT"
    status_code: [200, 201]
  register: grant_result
  retries: 3
  delay: 2
  until: grant_result.status in [200, 201]
  become: no
  
# ------------------------------------------------------------------------------
# DEBUG catálogo
# ------------------------------------------------------------------------------
- name: "polaris : Mostrar resultado da criação do catálogo"
  debug:
    var: polaris_catalog_result.status